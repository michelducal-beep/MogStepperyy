    <style>
    :root {
        --slider-pos: 50%; /* Suwak startuje na środku */
        --primary-yellow: #FFC107;
        --dark-bg: #0a0a0a;
        --text-light: #ffffff;
        --text-gray: #999999;
        --border-color: #1a1a1a;
    }
    #injected-slider-section {
        width: 100%;
        background-color: var(--dark-bg);
        padding: 60px 20px;
        font-family: 'Space Grotesk', sans-serif;
        border-top: 1px solid var(--border-color);
        border-bottom: 1px solid var(--border-color);
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
    }
    .transformation-container-injected {
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
    }
    .transformation-title-injected {
        color: var(--text-light);
        font-size: clamp(22px, 5vw, 30px);
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }
    .transformation-subtitle-injected {
        color: var(--text-gray);
        font-size: 15px;
        margin-bottom: 20px;
    }
    
    /* Przyciski sterujące */
    .slider-buttons-injected {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 25px;
    }
    .btn-injected {
        padding: 12px 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background: #111;
        color: var(--text-light);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .btn-injected:hover {
        border-color: var(--primary-yellow);
        background: #1a1a1a;
    }
    .btn-injected.active {
        background: var(--primary-yellow);
        color: #000;
        border-color: var(--primary-yellow);
    }

    .instruction-text-injected {
        color: var(--primary-yellow);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .instruction-text-injected svg {
        animation: slideLeft 1.5s infinite;
    }
    @keyframes slideLeft {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-5px); }
    }
    .comparison-slider-injected {
        position: relative;
        width: 100%;
        aspect-ratio: 412 / 1024;
        overflow: hidden;
        border-radius: 24px;
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
        cursor: ew-resize;
        user-select: none;
        border: 1px solid var(--border-color);
        background: #111;
        touch-action: none;
    }
    .comparison-slider-injected .image-injected {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
    /* Zdjęcie "Po" jest w tle (zawsze widoczne tam, gdzie nie ma zdjęcia "Przed") */
    .after-image-injected {
        z-index: 1;
    }
    /* Zdjęcie "Przed" jest na wierzchu i jest przycinane suwakiem */
    .before-image-injected {
        z-index: 2;
        width: var(--slider-pos);
        border-right: 3px solid var(--primary-yellow);
    }
    .slider-handle-injected {
        position: absolute;
        top: 50%;
        left: var(--slider-pos);
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        background-color: var(--primary-yellow);
        border-radius: 50%;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(255, 193, 7, 0.6);
        pointer-events: none;
        transition: left 0.1s ease-out; /* Delikatne wygładzenie przy klikaniu przycisków */
    }
    /* Wyłączamy transition podczas przeciągania myszką, żeby nie było laga */
    .comparison-slider-injected.sliding .slider-handle-injected,
    .comparison-slider-injected.sliding .before-image-injected {
        transition: none;
    }
    .before-image-injected {
        transition: width 0.1s ease-out;
    }

    .slider-handle-injected::before, .slider-handle-injected::after {
        content: '';
        width: 0; height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
    }
    .slider-handle-injected::before { border-right: 9px solid #000; margin-right: 4px; }
    .slider-handle-injected::after { border-left: 9px solid #000; margin-left: 4px; }
    
    .label-injected {
        position: absolute;
        bottom: 30px;
        padding: 10px 18px;
        background: rgba(0, 0, 0, 0.8);
        color: var(--text-light);
        font-weight: 700;
        border-radius: 12px;
        font-size: 12px;
        z-index: 4;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        text-transform: uppercase;
        pointer-events: none;
    }
    .label-before-injected { left: 20px; opacity: 0.9; }
    .label-after-injected { right: 20px; opacity: 0.9; }
    .label-highlight-injected { color: var(--primary-yellow); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script>
        (function() {
            const img_przed = "przed7cm.png";
            const img_po = "po7cm.png";

            const sliderHTML = `
                <section class="transformation-section-injected" id="injected-slider-section">
                    <div class="transformation-container-injected">
                        <h2 class="transformation-title-injected">Zobacz różnicę na demo</h2>
                        <p class="transformation-subtitle-injected">Porównanie sylwetki bez wkładek i z MogSteppery</p>
                        
                        <div class="slider-buttons-injected">
                            <button class="btn-injected" id="btn-before">Bez wkładek</button>
                            <button class="btn-injected" id="btn-after">Po +7 cm</button>
                        </div>

                        <div class="instruction-text-injected">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            Przesuń w lewo, aby zobaczyć różnicę
                        </div>
                        <div class="comparison-slider-injected" id="slider-root-injected">
                            <div class="image-injected after-image-injected" style="background-image: url('${img_po}')"></div>
                            <div class="image-injected before-image-injected" style="background-image: url('${img_przed}')"></div>
                            <div class="slider-handle-injected"></div>
                            <div class="label-injected label-before-injected">Bez wkładek</div>
                            <div class="label-injected label-after-injected">Po <span class="label-highlight-injected">+7CM</span></div>
                        </div>
                    </div>
                </section>
            `;

            function doInjection() {
                const checkAndInject = () => {
                    if (document.getElementById('injected-slider-section')) return;
                    
                    const allElements = Array.from(document.querySelectorAll('section, div'));
                    let target = null;

                    for (let el of allElements) {
                        if (el.textContent.includes('KORZYŚCI') || el.textContent.includes('Przemyślane od początku')) {
                            target = el.closest('section') || el.parentElement;
                            break;
                        }
                    }

                    if (!target) {
                        const sections = document.querySelectorAll('section');
                        if (sections.length > 0) {
                            target = sections[Math.floor(sections.length / 2)];
                        }
                    }

                    if (target) {
                        target.insertAdjacentHTML('afterend', sliderHTML);
                        setupSlider();
                    }
                };

                const interval = setInterval(checkAndInject, 500);
                setTimeout(() => clearInterval(interval), 5000);
            }

            function setupSlider() {
                const s = document.getElementById('slider-root-injected');
                const btnBefore = document.getElementById('btn-before');
                const btnAfter = document.getElementById('btn-after');
                if (!s) return;

                let sliding = false;

                const setPos = (p) => {
                    s.style.setProperty('--slider-pos', p + '%');
                    
                    // Aktualizacja stanu przycisków
                    if (p >= 95) {
                        btnBefore.classList.add('active');
                        btnAfter.classList.remove('active');
                    } else if (p <= 5) {
                        btnAfter.classList.add('active');
                        btnBefore.classList.remove('active');
                    } else {
                        btnBefore.classList.remove('active');
                        btnAfter.classList.remove('active');
                    }
                };

                const update = (e) => {
                    const r = s.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let p = ((clientX - r.left) / r.width) * 100;
                    p = Math.max(0, Math.min(p, 100));
                    setPos(p);
                };

                const start = (e) => { 
                    sliding = true; 
                    s.classList.add('sliding');
                    update(e); 
                };
                const move = (e) => { if (sliding) update(e); };
                const end = () => { 
                    sliding = false; 
                    s.classList.remove('sliding');
                };

                // Eventy myszy i dotyku
                s.addEventListener('mousedown', start);
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', end);
                
                s.addEventListener('touchstart', start, {passive: false});
                window.addEventListener('touchmove', (e) => { if(sliding) { e.preventDefault(); update(e); } }, {passive: false});
                window.addEventListener('touchend', end);

                // Obsługa przycisków
                btnBefore.addEventListener('click', () => setPos(100));
                btnAfter.addEventListener('click', () => setPos(0));

                // Inicjalizacja środkowej pozycji
                setPos(50);
            }

            doInjection();
        })();
    </script>
  </body>
