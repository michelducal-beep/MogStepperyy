    <style>
        /* Minimal Slider Styles */
        :root {
            --slider-pos: 50%;
            --primary-yellow: #FFC107;
            --dark-bg: #0a0a0a;
            --text-light: #ffffff;
            --text-gray: #999999;
            --border-color: #1a1a1a;
        }

        .transformation-section {
            width: 100%;
            background-color: var(--dark-bg);
            padding: 40px 20px;
            font-family: 'Space Grotesk', sans-serif;
            border-bottom: 1px solid var(--border-color);
        }

        .transformation-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        .transformation-title {
            color: var(--text-light);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .transformation-subtitle {
            color: var(--text-gray);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .comparison-slider {
            position: relative;
            width: 100%;
            aspect-ratio: 412 / 1024;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: ew-resize;
            user-select: none;
            border: 1px solid var(--border-color);
            background: #000;
            touch-action: none;
        }

        .comparison-slider .image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .comparison-slider .before {
            z-index: 1;
        }

        .comparison-slider .after {
            z-index: 2;
            width: var(--slider-pos);
            border-right: 2px solid var(--primary-yellow);
            transition: width 0.02s linear;
        }

        .slider-handle {
            position: absolute;
            top: 50%;
            left: var(--slider-pos);
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background-color: var(--primary-yellow);
            border-radius: 50%;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
            pointer-events: none;
        }

        .slider-handle::before, .slider-handle::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }

        .slider-handle::before {
            border-right: 8px solid #000;
            margin-right: 4px;
        }

        .slider-handle::after {
            border-left: 8px solid #000;
            margin-left: 4px;
        }

        .comparison-slider .label {
            position: absolute;
            bottom: 20px;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--text-light);
            font-weight: 700;
            border-radius: 6px;
            font-size: 12px;
            z-index: 4;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }

        .label-before { right: 20px; }
        .label-after { left: 20px; }
        .label-highlight { color: var(--primary-yellow); }

        @media (max-width: 768px) {
            .transformation-title { font-size: 24px; }
            .transformation-section { padding: 30px 15px; }
        }
    </style>

                let rect = slider.getBoundingClientRect();
                let position = ((x - rect.left) / rect.width) * 100;
                
                if (position < 0) position = 0;
                if (position > 100) position = 100;

            };
