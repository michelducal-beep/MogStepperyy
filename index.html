    :root {
        --slider-pos: 50%;
        --primary-yellow: #FFC107;
        --dark-bg: #0a0a0a;
        --text-light: #ffffff;
        --text-gray: #999999;
        --border-color: #1a1a1a;
    }
    #injected-slider-section {
        width: 100%;
        background-color: var(--dark-bg);
        padding: 40px 20px;
        font-family: 'Space Grotesk', sans-serif;
        border-top: 1px solid var(--border-color);
        border-bottom: 1px solid var(--border-color);
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
    }
    .transformation-container-injected {
        max-width: 550px; /* Zmniejszono z 700px */
        margin: 0 auto;
        text-align: center;
    }
    .transformation-title-injected {
        color: var(--text-light);
        font-size: clamp(20px, 4vw, 28px); /* Nieco mniejszy font */
        font-weight: 700;
        margin-bottom: 8px;
        text-transform: uppercase;
    }
    .transformation-subtitle-injected {
        color: var(--text-gray);
        font-size: 14px;
        margin-bottom: 25px;
    }
    .comparison-slider-injected {
        position: relative;
        width: 100%;
        aspect-ratio: 412 / 1024;
        overflow: hidden;
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        cursor: ew-resize;
        user-select: none;
        border: 1px solid var(--border-color);
        background: #000;
        touch-action: none;
    }
    .comparison-slider-injected .image-injected {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
    }
    .overlay-image-injected {
        z-index: 2;
        width: var(--slider-pos);
        border-right: 2px solid var(--primary-yellow);
    }
    .slider-handle-injected {
        position: absolute;
        top: 50%;
        left: var(--slider-pos);
        transform: translate(-50%, -50%);
        width: 40px; /* Nieco mniejszy uchwyt */
        height: 40px;
        background-color: var(--primary-yellow);
        border-radius: 50%;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
        pointer-events: none;
    }
    .slider-handle-injected::before, .slider-handle-injected::after {
        content: '';
        width: 0; height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
    }
    .slider-handle-injected::before { border-right: 7px solid #000; margin-right: 3px; }
    .slider-handle-injected::after { border-left: 7px solid #000; margin-left: 3px; }
    
    .label-injected {
        position: absolute;
        bottom: 20px;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.75);
        color: var(--text-light);
        font-weight: 700;
        border-radius: 8px;
        font-size: 12px;
        z-index: 4;
        backdrop-filter: blur(10px);
        cursor: pointer;
        text-transform: uppercase;
    }
    .label-left-injected { left: 20px; }
    .label-right-injected { right: 20px; }
    .label-highlight-injected { color: var(--primary-yellow); }

            const sliderHTML = `
                <section class="transformation-section-injected" id="injected-slider-section">
                    <div class="transformation-container-injected">
                        <h2 class="transformation-title-injected">Zobacz różnicę na demo</h2>
                        <p class="transformation-subtitle-injected">Przesuń suwak, aby porównać efekty</p>
                        <div class="comparison-slider-injected" id="slider-root-injected">
                            <div class="image-injected before-image-injected" style="background-image: url('${b64_przed}')"></div>
                            <div class="image-injected overlay-image-injected" style="background-image: url('${b64_po}')"></div>
                            <div class="slider-handle-injected"></div>
                            <div class="label-injected label-left-injected">Przed</div>
                            <div class="label-injected label-right-injected">Po <span class="label-highlight-injected">+7CM</span></div>
                        </div>
                    </div>
                </section>
            `;

            function doInjection() {
                const checkAndInject = () => {
                    if (document.getElementById('injected-slider-section')) return;
                    
                    const allElements = Array.from(document.querySelectorAll('section, div'));
                    let target = null;

                    for (let el of allElements) {
                        if (el.textContent.includes('KORZYŚCI') || el.textContent.includes('Przemyślane od początku')) {
                            target = el.closest('section') || el.parentElement;
                            break;
                        }
                    }

                    if (!target) {
                        const sections = document.querySelectorAll('section');
                        if (sections.length > 0) {
                            target = sections[Math.floor(sections.length / 2)];
                        }
                    }

                    if (target) {
                        target.insertAdjacentHTML('afterend', sliderHTML);
                        setupSlider();
                    }
                };

                const interval = setInterval(checkAndInject, 500);
                setTimeout(() => clearInterval(interval), 5000);
            }

            function setupSlider() {
                const s = document.getElementById('slider-root-injected');
                if (!s) return;

                let sliding = false;
                const update = (e) => {
                    const r = s.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let p = ((clientX - r.left) / r.width) * 100;
                    p = Math.max(0, Math.min(p, 100));
                    s.style.setProperty('--slider-pos', p + '%');
                };

                const start = (e) => { sliding = true; update(e); };
                const move = (e) => { if (sliding) update(e); };
                const end = () => sliding = false;

                s.addEventListener('mousedown', start);
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', end);
                
                s.addEventListener('touchstart', start, {passive: false});
                window.addEventListener('touchmove', (e) => { if(sliding) { e.preventDefault(); update(e); } }, {passive: false});
                window.addEventListener('touchend', end);
            }

            doInjection();
        })();
    </script>
